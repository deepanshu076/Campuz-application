<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academic Feed - Campuz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        font-family: "Inter", sans-serif;
      }
      body {
        background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .post-card {
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }
      .post-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(124, 58, 237, 0.2);
      }
      .comment-section {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }
      .comment-section.active {
        max-height: 300px;
      }
    </style>
  </head>
  <body class="text-white">
    <div class="flex h-screen">
      <!-- Sidebar (same as dashboard) -->
      <aside id="sidebar" class="w-64 glass-effect fixed h-full overflow-y-auto transform -translate-x-full md:translate-x-0 transition-transform duration-200 ease-in-out z-40 bg-[#020617] md:bg-transparent border-r border-gray-800 md:border-none">
        <div class="p-6">
          <h2 class="text-2xl font-bold gradient-text mb-8">Campuz</h2>
          <nav class="space-y-2">
            <a
              href="dashboard.html"
              class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg"
            >
              <i class="fas fa-home"></i>
              <span>Dashboard</span>
            </a>
            <a
              href="feed.html"
              class="sidebar-item active flex items-center space-x-3 px-4 py-3 rounded-lg"
            >
              <i class="fas fa-newspaper"></i>
              <span>Academic Feed</span>
            </a>
            <a
              href="chat.html"
              class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg"
            >
              <i class="fas fa-robot"></i>
              <span>AI Assistant</span>
            </a>
            <a
              href="search.html"
              class="sidebar-item flex items-center space-x-3 px-4 py-3 rounded-lg"
            >
              <i class="fas fa-search"></i>
              <span>Search</span>
            </a>
          </nav>
        </div>
        <div class="absolute bottom-8 left-0 w-full px-6">
          <button onclick="api.logout()" class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-red-500 hover:bg-red-500/10 transition">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 w-full md:ml-64 overflow-y-auto min-h-screen">
        <!-- Top Navbar -->
        <nav class="glass-effect sticky top-0 z-10 w-full">
          <div class="flex justify-between items-center px-6 py-4">
            <div class="flex items-center">
              <button id="mobileMenuBtn" class="md:hidden text-2xl mr-4 focus:outline-none text-purple-400">
                <i class="fas fa-bars"></i>
              </button>
              <h1 class="text-xl md:text-2xl font-bold">Academic Feed</h1>
            </div>
            <div class="flex items-center space-x-4">
              <button
                id="createPostBtn"
                class="px-4 py-2 rounded-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 transition"
              >
                <i class="fas fa-plus mr-2"></i>Create Post
              </button>
              <div class="relative">
                <i
                  class="fas fa-bell text-xl cursor-pointer hover:text-purple-400 transition"
                ></i>
              </div>
            </div>
          </div>
        </nav>

        <!-- Feed Content -->
        <div class="p-6 max-w-2xl mx-auto">
          <!-- Create Post Modal (Hidden by default) -->
          <div
            id="createPostModal"
            class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden"
          >
            <div class="glass-effect rounded-2xl p-6 w-full max-w-lg">
              <h3 class="text-xl font-bold mb-4">Create New Post</h3>
              <select
                id="postType"
                class="w-full mb-3 px-4 py-2 rounded-lg bg-gray-800 border border-gray-700"
              >
                <option value="notice">Notice</option>
                <option value="event">Event</option>
                <option value="announcement">Announcement</option>
              </select>
              <input
                type="text"
                id="postTitle"
                placeholder="Title"
                class="w-full mb-3 px-4 py-2 rounded-lg bg-gray-800 border border-gray-700"
              />
              <textarea
                id="postContent"
                placeholder="Content"
                rows="4"
                class="w-full mb-3 px-4 py-2 rounded-lg bg-gray-800 border border-gray-700"
              ></textarea>
              <input
                type="url"
                id="postImage"
                placeholder="Image URL (optional)"
                class="w-full mb-4 px-4 py-2 rounded-lg bg-gray-800 border border-gray-700"
              />
              <div class="flex justify-end space-x-3">
                <button
                  onclick="closeModal()"
                  class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600"
                >
                  Cancel
                </button>
                <button
                  onclick="createPost()"
                  class="px-4 py-2 rounded-lg bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700"
                >
                  Post
                </button>
              </div>
            </div>
          </div>

          <!-- Posts Feed -->
          <div id="postsFeed" class="space-y-6">
            <!-- Posts will be dynamically loaded here -->
            <div class="text-center py-10">
              <i class="fas fa-spinner fa-spin text-3xl text-purple-500"></i>
              <p class="mt-2 text-gray-400">Loading posts...</p>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/feed.js"></script>
    <script>
      const mobileMenuBtn = document.getElementById('mobileMenuBtn');
      const sidebar = document.getElementById('sidebar');
      if (mobileMenuBtn && sidebar) {
        mobileMenuBtn.addEventListener('click', () => {
          sidebar.classList.toggle('-translate-x-full');
        });
        
        document.addEventListener('click', (e) => {
          if (window.innerWidth < 768 && !sidebar.contains(e.target) && e.target !== mobileMenuBtn && !mobileMenuBtn.contains(e.target)) {
            if (!sidebar.classList.contains('-translate-x-full')) {
              sidebar.classList.add('-translate-x-full');
            }
          }
        });
      }
    </script>
  </body>
</html>
