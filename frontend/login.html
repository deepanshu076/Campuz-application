<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Campuz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        font-family: "Inter", sans-serif;
      }
      body {
        background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .gradient-text {
        background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      /* Floating Label CSS */
      .floating-input {
        background-color: transparent;
      }
      .floating-input:focus ~ .floating-label,
      .floating-input:not(:placeholder-shown) ~ .floating-label {
        transform: translateY(-1.2rem) scale(0.8);
        color: #ec4899; /* Pink emphasis */
      }
    </style>
  </head>
  <body class="text-white min-h-screen flex items-center justify-center p-4">
    <div class="glass-effect rounded-3xl p-8 md:p-12 w-full max-w-md shadow-2xl relative overflow-hidden">
      <!-- Decorative element -->
      <div class="absolute -top-10 -right-10 w-40 h-40 bg-purple-600 rounded-full mix-blend-multiply filter blur-2xl opacity-30"></div>
      <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-pink-600 rounded-full mix-blend-multiply filter blur-2xl opacity-30"></div>
      
      <div class="relative z-10">
        <div class="text-center mb-10">
          <a href="index.html" class="inline-block text-3xl font-bold gradient-text mb-2">Campuz</a>
          <p class="text-gray-400">Welcome back! Please login to your account.</p>
        </div>

        <form id="loginForm" class="space-y-6">
          <div id="errorMsg" class="hidden text-red-500 text-sm text-center bg-red-500/10 py-2 rounded-lg"></div>

          <!-- Email Input -->
          <div class="relative">
            <input
              type="email"
              id="email"
              name="email"
              class="floating-input peer w-full border-b border-gray-600 py-3 text-white focus:outline-none focus:border-purple-500 transition-colors"
              placeholder=" "
              required
            />
            <label
              for="email"
              class="floating-label absolute left-0 top-3 text-gray-400 cursor-text transition-all duration-300 pointer-events-none"
              >Email Address</label
            >
          </div>

          <!-- Password Input -->
          <div class="relative">
            <input
              type="password"
              id="password"
              name="password"
              class="floating-input peer w-full border-b border-gray-600 py-3 text-white focus:outline-none focus:border-purple-500 transition-colors"
              placeholder=" "
              required
            />
            <label
              for="password"
              class="floating-label absolute left-0 top-3 text-gray-400 cursor-text transition-all duration-300 pointer-events-none"
              >Password</label
            >
          </div>

          <div class="flex justify-between items-center text-sm">
            <label class="flex items-center text-gray-400 cursor-pointer">
              <input type="checkbox" class="mr-2 rounded border-gray-600 focus:ring-purple-500 bg-transparent" />
              Remember me
            </label>
            <a href="#" class="text-purple-400 hover:text-pink-400 transition-colors">Forgot Password?</a>
          </div>

          <button
            type="submit"
            id="loginBtn"
            class="w-full py-3 rounded-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 transition font-semibold shadow-lg shadow-purple-500/30 flex justify-center items-center"
          >
            <span id="loginBtnText">Sign In</span>
            <i id="loginSpinner" class="fas fa-spinner fa-spin hidden ml-2"></i>
          </button>
        </form>

        <p class="text-center text-gray-400 text-sm mt-8">
          Don't have an account? <a href="register.html" class="text-purple-400 font-semibold hover:text-pink-400 transition-colors">Sign up</a>
        </p>

        <!-- Fast Login Demos -->
        <div class="mt-8 pt-6 border-t border-gray-800">
          <p class="text-xs text-gray-500 text-center mb-3">Quick Login (Demo Accounts)</p>
          <div class="flex justify-center space-x-2">
            <button onclick="demoLogin('student@campuz.com', 'pwd_student')" class="text-xs px-3 py-1 bg-gray-800 hover:bg-gray-700 rounded-full transition">Student</button>
            <button onclick="demoLogin('faculty@campuz.com', 'pwd_faculty')" class="text-xs px-3 py-1 bg-gray-800 hover:bg-gray-700 rounded-full transition">Faculty</button>
            <button onclick="demoLogin('admin@campuz.com', 'admin_password')" class="text-xs px-3 py-1 bg-gray-800 hover:bg-gray-700 rounded-full transition">Admin</button>
          </div>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
      // Demo login shortcut
      function demoLogin(email, password) {
        document.getElementById('email').value = email;
        document.getElementById('password').value = password;
        // Trigger style update
        document.getElementById('password').focus();
        document.getElementById('email').focus();
        document.getElementById('loginBtn').click();
      }
    </script>
  </body>
</html>
