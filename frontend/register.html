<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Campuz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * {
        font-family: "Inter", sans-serif;
      }
      body {
        background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
      }
      .glass-effect {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .gradient-text {
        background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      /* Floating Label CSS */
      .floating-input, .floating-select {
        background-color: transparent;
      }
      .floating-input:focus ~ .floating-label,
      .floating-input:not(:placeholder-shown) ~ .floating-label {
        transform: translateY(-1.2rem) scale(0.8);
        color: #ec4899; /* Pink emphasis */
      }
      /* Specific override for select to push label up immediately since it always has a value */
      .floating-select ~ .floating-label {
        transform: translateY(-1.2rem) scale(0.8);
      }
      /* Change select unselected option color */
      select option {
        background-color: #0f172a;
        color: white;
      }
    </style>
  </head>
  <body class="text-white min-h-screen flex items-center justify-center p-4">
    <div class="glass-effect rounded-3xl p-8 md:p-12 w-full max-w-md shadow-2xl relative overflow-hidden my-8">
      <!-- Decorative element -->
      <div class="absolute -top-10 -left-10 w-40 h-40 bg-pink-600 rounded-full mix-blend-multiply filter blur-2xl opacity-30"></div>
      <div class="absolute -bottom-10 -right-10 w-40 h-40 bg-purple-600 rounded-full mix-blend-multiply filter blur-2xl opacity-30"></div>
      
      <div class="relative z-10">
        <div class="text-center mb-10">
          <a href="index.html" class="inline-block text-3xl font-bold gradient-text mb-2">Join Campuz</a>
          <p class="text-gray-400">Create your academic profile today.</p>
        </div>

        <form id="registerForm" class="space-y-6">
          <div id="errorMsg" class="hidden text-red-500 text-sm text-center bg-red-500/10 py-2 rounded-lg"></div>

          <!-- Full Name Input -->
          <div class="relative">
            <input
              type="text"
              id="name"
              name="name"
              class="floating-input peer w-full border-b border-gray-600 py-3 text-white focus:outline-none focus:border-purple-500 transition-colors"
              placeholder=" "
              required
            />
            <label
              for="name"
              class="floating-label absolute left-0 top-3 text-gray-400 cursor-text transition-all duration-300 pointer-events-none"
              >Full Name</label
            >
          </div>

          <!-- Email Input -->
          <div class="relative">
            <input
              type="email"
              id="email"
              name="email"
              class="floating-input peer w-full border-b border-gray-600 py-3 text-white focus:outline-none focus:border-purple-500 transition-colors"
              placeholder=" "
              required
            />
            <label
              for="email"
              class="floating-label absolute left-0 top-3 text-gray-400 cursor-text transition-all duration-300 pointer-events-none"
              >Email Address</label
            >
          </div>

          <!-- Phone Input -->
          <div class="relative">
            <input
              type="tel"
              id="phone"
              name="phone"
              class="floating-input peer w-full border-b border-gray-600 py-3 text-white focus:outline-none focus:border-purple-500 transition-colors"
              placeholder=" "
            />
            <label
              for="phone"
              class="floating-label absolute left-0 top-3 text-gray-400 cursor-text transition-all duration-300 pointer-events-none"
              >Phone Number (Optional)</label
            >
          </div>

          <!-- Department Input -->
          <div class="relative">
            <input
              type="text"
              id="department"
              name="department"
              class="floating-input peer w-full border-b border-gray-600 py-3 text-white focus:outline-none focus:border-purple-500 transition-colors"
              placeholder=" "
              required
            />
            <label
              for="department"
              class="floating-label absolute left-0 top-3 text-gray-400 cursor-text transition-all duration-300 pointer-events-none"
              >Department (e.g. Computer Science)</label
            >
          </div>

          <!-- Role Select -->
          <div class="relative pt-2">
            <select
              id="role"
              name="role"
              class="floating-select peer w-full border-b border-gray-600 py-3 text-white focus:outline-none focus:border-purple-500 transition-colors cursor-pointer appearance-none"
              required
            >
              <option value="student">Student</option>
              <option value="faculty">Faculty</option>
            </select>
            <label
              for="role"
              class="floating-label absolute left-0 top-1 text-gray-400 cursor-text transition-all duration-300 pointer-events-none"
              >Role</label
            >
            <i class="fas fa-chevron-down absolute right-2 top-5 text-gray-400 pointer-events-none"></i>
          </div>

          <!-- Password Input -->
          <div class="relative pt-2">
            <input
              type="password"
              id="password"
              name="password"
              class="floating-input peer w-full border-b border-gray-600 py-3 text-white focus:outline-none focus:border-purple-500 transition-colors"
              placeholder=" "
              required
            />
            <label
              for="password"
              class="floating-label absolute left-0 top-5 text-gray-400 cursor-text transition-all duration-300 pointer-events-none"
              >Create Password</label
            >
          </div>

          <button
            type="submit"
            id="registerBtn"
            class="mt-8 w-full py-3 rounded-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 transition font-semibold shadow-lg shadow-purple-500/30 flex justify-center items-center"
          >
            <span id="registerBtnText">Sign Up</span>
            <i id="registerSpinner" class="fas fa-spinner fa-spin hidden ml-2"></i>
          </button>
        </form>

        <p class="text-center text-gray-400 text-sm mt-8">
          Already have an account? <a href="login.html" class="text-pink-400 font-semibold hover:text-purple-400 transition-colors">Sign in</a>
        </p>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
